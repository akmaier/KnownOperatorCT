experiment_name: known_operator_ct_fc_lme

# FC model scaled for LME lab GPU nodes.
# 256x256 with 90 views: 1.51 billion parameters.
#   FP32 weights:  ~5.6 GB  (single GPU or FSDP sharded)
#   Adam state:   ~22.5 GB  (CPU offload with FSDP)
#
# Fits on a SINGLE GPU with >= 8 GB (1080Ti, V100, RTX 6000, etc.)
# without FSDP, using standard ct_train.py.
#
# Still much larger than the 16x16 surrogate and demonstrates the
# paper's core thesis: FC needs far more data than KO.

geometry:
  image_size: 256
  num_views: 90
  detector_bins: 256
  angular_range_degrees: 180.0
  source_to_iso_mm: 1000.0
  source_to_detector_mm: 1500.0
  detector_pixel_mm: 1.0

dataset:
  num_train_slices: 1000
  num_val_slices: 50
  num_test_slices: 50
  num_folds: 1
  ellipses_per_slice: [3, 6]
  noise_sigma: 0.005
  seed: 1

training:
  batch_size: 4
  num_iterations: 10000
  learning_rate: 2.0e-2
  optimizer: adagrad
  log_every: 100
  checkpoint_every: 2000
  device: cuda

reporting:
  out_dir: results
  results_markdown: results/RESULTS.md
