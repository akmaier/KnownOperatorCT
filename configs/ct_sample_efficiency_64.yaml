experiment_name: ct_sample_efficiency_gpu_64

# 64x64 fan-beam, 30 views, 64 detector bins.
# FC weight matrix has 64*64 * 30*64 = 4096 * 1920 = 7.86M params
# (FP32 weights ~31 MB). Tiny — fits in any GPU corner.

geometry:
  image_size: 64
  num_views: 30
  detector_bins: 64
  angular_range_degrees: 180.0
  source_to_iso_mm: 1000.0
  source_to_detector_mm: 1500.0
  detector_pixel_mm: 1.0

dataset:
  num_test_slices: 50
  ellipses_per_slice: [3, 6]
  noise_sigma: 0.005
  seed: 1

ablation:
  train_sizes: [4, 16, 64, 256, 1024, 2048]
  seeds: [1, 2, 3]

training:
  batch_size: 4
  num_iterations: 5000
  learning_rate: 2.0e-2
  optimizer: adagrad
  device: cuda

reporting:
  out_dir: results/sample_efficiency_64
